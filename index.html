<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dew Point Calculator</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .container { width: 100%; max-width: 450px; }
        h2 { text-align: center; margin-bottom: 20px; }
        
        .main-layout { display: flex; flex-direction: column; gap: 15px; }
        
        .fields { display: flex; flex-direction: column; gap: 15px; }
        .input-box { display: flex; flex-direction: column; }
        
        label { font-weight: bold; margin-bottom: 5px; font-size: 14px; }
        input { 
            padding: 20px; 
            border: 1px solid #ccc; 
            border-radius: 8px; 
            font-size: 24px; 
            text-align: center; 
            width: 100%;
            box-sizing: border-box;
        }

        button { 
            width: 100%; 
            padding: 20px;
            background-color: #007bff; 
            color: white; 
            border: none; 
            border-radius: 10px; 
            cursor: pointer; 
            font-size: 20px; 
            font-weight: bold;
        }
        
        #result { 
            background-color: #f0f7ff; 
            border: 1px solid #007bff; 
            text-align: center; 
            padding: 30px; 
            border-radius: 10px; 
            font-size: 40px; 
            font-weight: bold; 
            color: #0056b3; 
            margin-top: 20px; 
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Dew Point Calculator</h2>
    <div class="main-layout">
        <div class="fields">
            <div class="input-box">
                <label>Dry Bulb Temp (°C)</label>
                <input type="number" id="temp" value="25">
            </div>
            <div class="input-box">
                <label>Relative Humidity (%)</label>
                <input type="number" id="humidity" value="45">
            </div>
        </div>
        <button onclick="calculateDewPoint()">Calculate</button>
    </div>
    <div id="result">-- °C</div>
</div>

<script>
    function calculateDewPoint() {
        const T = parseFloat(document.getElementById('temp').value);
        const RH = parseFloat(document.getElementById('humidity').value);

        if (isNaN(T) || isNaN(RH)) {
            alert("값을 정확히 입력해주세요.");
            return;
        }

        const a = 17.27;
        const b = 237.7;
        const alpha = ((a * T) / (b + T)) + Math.log(RH / 100);
        const dewPoint = (b * alpha) / (a - alpha);

        document.getElementById('result').innerText = dewPoint.toFixed(1) + " °C";
    }
</script>

</body>
</html>
