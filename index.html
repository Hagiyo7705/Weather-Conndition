<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dew Point Calculator</title>
    <style>
        body { font-family: sans-serif; padding: 20px; margin: 0; background-color: #fff; }
        .container { max-width: 500px; margin: 0 auto; }
        h2 { text-align: center; font-size: 28px; margin-bottom: 30px; }
        
        .main-layout { display: flex; flex-direction: column; gap: 25px; }
        
        .input-box { display: flex; flex-direction: column; gap: 10px; }
        label { font-weight: bold; font-size: 20px; color: #333; }
        
        input { 
            padding: 25px; 
            border: 2px solid #ccc; 
            border-radius: 12px; 
            font-size: 32px; /* 입력값 글자 크기 대폭 확대 */
            text-align: center; 
            width: 100%;
            box-sizing: border-box;
        }

        button { 
            width: 100%; 
            padding: 30px; /* 버튼 높이 대폭 확대 */
            background-color: #007bff; 
            color: white; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            font-size: 28px; /* 버튼 글자 크기 확대 */
            font-weight: bold;
        }
        
        #result { 
            background-color: #f0f7ff; 
            border: 2px solid #007bff; 
            text-align: center; 
            padding: 40px; 
            border-radius: 12px; 
            font-size: 56px; /* 결과값 글자 크기 대폭 확대 */
            font-weight: bold; 
            color: #0056b3; 
            margin-top: 30px; 
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Dew Point Calculator</h2>
    <div class="main-layout">
        <div class="input-box">
            <label>Dry Bulb Temp (°C)</label>
            <input type="number" id="temp" value="25" pattern="\d*">
        </div>
        <div class="input-box">
            <label>Relative Humidity (%)</label>
            <input type="number" id="humidity" value="45" pattern="\d*">
        </div>
        <button onclick="calculateDewPoint()">Calculate</button>
    </div>
    <div id="result">-- °C</div>
</div>

<script>
    function calculateDewPoint() {
        const T = parseFloat(document.getElementById('temp').value);
        const RH = parseFloat(document.getElementById('humidity').value);

        if (isNaN(T) || isNaN(RH)) {
            alert("숫자를 올바르게 입력해주세요.");
            return;
        }

        const a = 17.27;
        const b = 237.7;
        const alpha = ((a * T) / (b + T)) + Math.log(RH / 100);
        const dewPoint = (b * alpha) / (a - alpha);

        document.getElementById('result').innerText = dewPoint.toFixed(1) + " °C";
    }
</script>

</body>
</html>
