<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dew Point Calculator</title>
    <style>
        body { font-family: sans-serif; padding: 20px; display: flex; justify-content: center; background-color: #fff; }
        .container { width: 100%; max-width: 600px; }
        h2 { text-align: center; font-size: 28px; margin-bottom: 30px; }
        
        .input-wrapper { display: flex; gap: 15px; align-items: flex-end; }
        .fields { flex: 1; display: flex; flex-direction: column; gap: 15px; }
        
        .input-group { display: flex; flex-direction: column; }
        label { font-weight: bold; font-size: 18px; margin-bottom: 8px; }
        input { 
            padding: 20px; border: 2px solid #ccc; border-radius: 10px; 
            font-size: 24px; text-align: center; width: 100%; box-sizing: border-box;
        }

        button { 
            width: 150px; height: 150px;
            background-color: #007bff; color: white; border: none; 
            border-radius: 10px; cursor: pointer; font-size: 22px; font-weight: bold;
        }

        #result { 
            background-color: #f0f7ff; border: 2px solid #007bff; 
            text-align: center; padding: 40px; border-radius: 10px; 
            font-size: 50px; font-weight: bold; color: #0056b3; margin-top: 30px; 
        }

        @media (max-width: 500px) {
            .input-wrapper { flex-direction: column; }
            button { width: 100%; height: 70px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Dew Point Calculator</h2>
    <div class="input-wrapper">
        <div class="fields">
            <div class="input-group">
                <label>Dry Bulb Temp (°C)</label>
                <!-- onfocus="this.value=''"를 추가하여 클릭 시 값이 비워지게 설정 -->
                <input type="number" id="temp" value="25" onfocus="this.value=''">
            </div>
            <div class="input-group">
                <label>Relative Humidity (%)</label>
                <!-- onfocus="this.value=''"를 추가하여 클릭 시 값이 비워지게 설정 -->
                <input type="number" id="humidity" value="45" onfocus="this.value=''">
            </div>
        </div>
        <button onclick="calculateDewPoint()">Calculate</button>
    </div>
    <div id="result">-- °C</div>
</div>

<script>
    function calculateDewPoint() {
        const tempInput = document.getElementById('temp');
        const humidityInput = document.getElementById('humidity');
        
        const T = parseFloat(tempInput.value);
        const RH = parseFloat(humidityInput.value);

        if (isNaN(T) || isNaN(RH)) {
            alert("숫자를 올바르게 입력해주세요.");
            return;
        }

        const a = 17.27;
        const b = 237.7;
        const alpha = ((a * T) / (b + T)) + Math.log(RH / 100);
        const dewPoint = (b * alpha) / (a - alpha);

        document.getElementById('result').innerText = dewPoint.toFixed(1) + " °C";
    }
</script>

</body>
</html>
